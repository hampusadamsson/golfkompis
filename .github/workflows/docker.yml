name: Docker Build

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "frontend/**"
      - "Dockerfile"
      - ".dockerignore"
      - ".github/workflows/docker.yml"
  pull_request:
    paths:
      - "backend/**"
      - "frontend/**"
      - "Dockerfile"
      - ".dockerignore"
      - ".github/workflows/docker.yml"

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
